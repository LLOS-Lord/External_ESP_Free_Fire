name: Build TrollSpeed ESP

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Theos (tăng tốc build)
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-theos-${{ hashFiles('**/Makefile') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: ${{ github.workspace }}/theos
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Build package
        run: |
          export THEOS=${{ github.workspace }}/theos
          export PATH=$THEOS/bin:$PATH
          
          make clean
          make package FINALPACKAGE=1 FOR_RELEASE=1

      - name: Upload .tipa
        uses: actions/upload-artifact@v4
        with:
          name: TrollSpeed-ESP
          path: packages/*.tipa
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.tipa
          tag_name: ${{ github.ref_name }}
          name: TrollSpeed ESP ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
