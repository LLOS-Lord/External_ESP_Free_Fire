name: Build TrollSpeed ESP (Theos)

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install bash perl ldid xz
          echo "/opt/homebrew/opt/bash/bin" >> $GITHUB_PATH

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: ~/theos
          # Bạn có thể chỉ định SDK version nếu cần
          # sdk-repo: https://github.com/theos/sdks

      - name: Build package
        run: |
          export THEOS=~/theos
          export PATH=$THEOS/bin:$PATH
          
          make clean
          make package FINALPACKAGE=1 FOR_RELEASE=1
          
          echo "✅ Build completed successfully!"

      - name: Upload .tipa artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TrollSpeed-ESP
          path: |
            packages/*.tipa
          retention-days: 30

      - name: Create Release (khi push tag v*)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*.tipa
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
